services:
  db:
    image: postgres:17-alpine
    container_name: ecom-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecom
    volumes:
      - ecom_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: 464209272334.dkr.ecr.us-east-1.amazonaws.com/go-ecom-api:latest
    container_name: ecom-api
    ports:
      - "8080:8080"
    environment:
      DSN: "host=db user=postgres password=postgres dbname=ecom sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

volumes:
  ecom_postgres_data: